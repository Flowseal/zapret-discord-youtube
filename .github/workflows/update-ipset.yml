name: Update IPSet

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update-ipset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest ipset from upstream
        run: |
          curl -sL "https://raw.githubusercontent.com/Flowseal/zapret-discord-youtube/main/.service/ipset-service.txt" -o ipset-upstream.txt
          if [ -s ipset-upstream.txt ]; then
            echo "=== Upstream ipset fetched ==="
            wc -l ipset-upstream.txt
          else
            echo "Failed to fetch upstream ipset"
            exit 1
          fi

      - name: Merge ipsets
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          OUT="lists/ipset-all.txt"
          echo "# Gaming EU - Valve/Faceit" > "$OUT"
          echo "# Updated: $TODAY" >> "$OUT"
          echo "" >> "$OUT"
          echo "# Valve/Steam EU Server Ranges" >> "$OUT"
          echo "155.133.0.0/17" >> "$OUT"
          echo "185.25.180.0/22" >> "$OUT"
          echo "185.25.181.0/24" >> "$OUT"
          echo "185.25.182.0/24" >> "$OUT"
          echo "185.25.183.0/24" >> "$OUT"
          echo "162.254.192.0/21" >> "$OUT"
          echo "162.254.196.0/22" >> "$OUT"
          echo "208.64.200.0/22" >> "$OUT"
          echo "205.196.6.0/24" >> "$OUT"
          echo "205.196.7.0/24" >> "$OUT"
          echo "192.69.96.0/22" >> "$OUT"
          echo "" >> "$OUT"
          echo "# Faceit EU CDN/Platform" >> "$OUT"
          echo "104.18.0.0/16" >> "$OUT"
          echo "104.19.0.0/16" >> "$OUT"
          echo "172.64.0.0/13" >> "$OUT"
          echo "173.245.48.0/20" >> "$OUT"
          echo "103.21.244.0/22" >> "$OUT"
          echo "103.22.200.0/22" >> "$OUT"
          echo "103.31.4.0/22" >> "$OUT"
          echo "141.101.64.0/18" >> "$OUT"
          echo "108.162.192.0/18" >> "$OUT"
          echo "190.93.240.0/20" >> "$OUT"
          echo "188.114.96.0/20" >> "$OUT"
          echo "197.234.240.0/22" >> "$OUT"
          echo "198.41.128.0/17" >> "$OUT"
          echo "" >> "$OUT"
          echo "# Valve Game Servers (EU)" >> "$OUT"
          echo "146.66.152.0/21" >> "$OUT"
          echo "146.66.156.0/22" >> "$OUT"
          echo "146.66.158.0/24" >> "$OUT"
          echo "153.254.86.0/24" >> "$OUT"
          echo "153.254.87.0/24" >> "$OUT"
          echo "153.254.88.0/24" >> "$OUT"
          echo "153.254.89.0/24" >> "$OUT"
          echo "153.254.90.0/24" >> "$OUT"
          echo "155.133.224.0/20" >> "$OUT"
          echo "155.133.240.0/21" >> "$OUT"
          echo "" >> "$OUT"
          echo "# Upstream (Flowseal)" >> "$OUT"
          grep -v "^#" ipset-upstream.txt | grep -v "^$" >> "$OUT"
          rm -f ipset-upstream.txt
          echo "=== Merged ipset ==="
          wc -l "$OUT"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update ipset from upstream"
          title: "Auto-update ipset"
          body: |
            Automated ipset update from Flowseal upstream.
            Gaming EU ranges preserved.
          branch: auto-update-ipset
          delete-branch: true
